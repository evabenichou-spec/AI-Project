<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bouncing Balls</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #1a1a2e;
    }
    canvas {
      border: 3px solid #e0e0e0;
      border-radius: 8px;
      background: #16213e;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 800;
    canvas.height = 500;

    const COLORS = [
      { fill: '#ff4444', glow: 'rgba(255, 68, 68, 0.4)' },
      { fill: '#4488ff', glow: 'rgba(68, 136, 255, 0.4)' },
      { fill: '#44dd44', glow: 'rgba(68, 221, 68, 0.4)' },
      { fill: '#ff9933', glow: 'rgba(255, 153, 51, 0.4)' },
      { fill: '#ffffff', glow: 'rgba(255, 255, 255, 0.35)' },
      { fill: '#44dd44', glow: 'rgba(68, 221, 68, 0.4)' },
      { fill: '#44dd44', glow: 'rgba(68, 221, 68, 0.4)' },
      { fill: '#44dd44', glow: 'rgba(68, 221, 68, 0.4)' },
      { fill: '#44dd44', glow: 'rgba(68, 221, 68, 0.4)' },
    ];

    const sparks = [];

    class Ball {
      constructor(color, index) {
        this.baseRadius = 24;
        this.radius = this.baseRadius;
        this.hitScale = 1;
        this.x = this.baseRadius + Math.random() * (canvas.width - this.baseRadius * 2);
        this.y = this.baseRadius + Math.random() * (canvas.height - this.baseRadius * 2);
        this.vx = (4 + Math.random() * 4) * (Math.random() < 0.5 ? 1 : -1);
        this.vy = (4 + Math.random() * 4) * (Math.random() < 0.5 ? 1 : -1);
        this.color = color;
        this.trail = [];
      }

      update() {
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > 10) this.trail.shift();

        this.hitScale += (1 - this.hitScale) * 0.15;
        this.radius = this.baseRadius * this.hitScale;

        this.x += this.vx;
        this.y += this.vy;

        if (this.x - this.baseRadius <= 0) {
          this.x = this.baseRadius;
          this.vx *= -1;
        } else if (this.x + this.baseRadius >= canvas.width) {
          this.x = canvas.width - this.baseRadius;
          this.vx *= -1;
        }

        if (this.y - this.baseRadius <= 0) {
          this.y = this.baseRadius;
          this.vy *= -1;
        } else if (this.y + this.baseRadius >= canvas.height) {
          this.y = canvas.height - this.baseRadius;
          this.vy *= -1;
        }
      }

      onHit() {
        this.hitScale = 1.4;
      }

      draw() {
        for (let i = 0; i < this.trail.length; i++) {
          const alpha = (i / this.trail.length) * 0.3;
          const r = this.radius * (0.4 + (i / this.trail.length) * 0.6);
          ctx.beginPath();
          ctx.arc(this.trail[i].x, this.trail[i].y, r, 0, Math.PI * 2);
          ctx.fillStyle = this.color.glow.replace(/[\d.]+\)$/, alpha + ')');
          ctx.fill();
        }

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius + 8, 0, Math.PI * 2);
        ctx.fillStyle = this.color.glow;
        ctx.fill();

        const gradient = ctx.createRadialGradient(
          this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.1,
          this.x, this.y, this.radius
        );
        gradient.addColorStop(0, '#ffffff');
        gradient.addColorStop(0.3, this.color.fill);
        gradient.addColorStop(1, this.darken(this.color.fill, 0.5));

        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.35, this.radius * 0.22, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.fill();
      }

      darken(hex, factor) {
        const r = Math.floor(parseInt(hex.slice(1, 3), 16) * factor);
        const g = Math.floor(parseInt(hex.slice(3, 5), 16) * factor);
        const b = Math.floor(parseInt(hex.slice(5, 7), 16) * factor);
        return `rgb(${r},${g},${b})`;
      }
    }

    function spawnSparks(x, y, colorA, colorB) {
      for (let i = 0; i < 8; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 4;
        sparks.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          color: Math.random() < 0.5 ? colorA : colorB,
        });
      }
    }

    function updateAndDrawSparks() {
      for (let i = sparks.length - 1; i >= 0; i--) {
        const s = sparks[i];
        s.x += s.vx;
        s.y += s.vy;
        s.life -= 0.04;
        if (s.life <= 0) { sparks.splice(i, 1); continue; }
        ctx.beginPath();
        ctx.arc(s.x, s.y, 3 * s.life, 0, Math.PI * 2);
        ctx.fillStyle = s.color.replace(/[\d.]+\)$/, s.life + ')');
        ctx.fill();
      }
    }

    function resolveCollisions(balls) {
      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          const a = balls[i], b = balls[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minDist = a.baseRadius + b.baseRadius;

          if (dist < minDist) {
            const nx = dx / dist;
            const ny = dy / dist;
            const overlap = minDist - dist;

            a.x -= nx * overlap / 2;
            a.y -= ny * overlap / 2;
            b.x += nx * overlap / 2;
            b.y += ny * overlap / 2;

            const dvx = a.vx - b.vx;
            const dvy = a.vy - b.vy;
            const dot = dvx * nx + dvy * ny;

            if (dot > 0) {
              a.vx -= dot * nx;
              a.vy -= dot * ny;
              b.vx += dot * nx;
              b.vy += dot * ny;

              a.onHit();
              b.onHit();

              const mx = (a.x + b.x) / 2;
              const my = (a.y + b.y) / 2;
              spawnSparks(mx, my, a.color.glow, b.color.glow);
            }
          }
        }
      }
    }

    const balls = COLORS.map((color, i) => new Ball(color, i));

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      balls.forEach(ball => ball.update());
      resolveCollisions(balls);
      balls.forEach(ball => ball.draw());
      updateAndDrawSparks();

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
