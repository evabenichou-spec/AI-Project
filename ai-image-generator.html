<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina — AI Image Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a26;
      --bg-card-hover: #22222f;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-focus: rgba(139, 92, 246, 0.5);
      --text-primary: #f0f0f5;
      --text-secondary: #8a8a9a;
      --text-muted: #55556a;
      --accent-purple: #8b5cf6;
      --accent-purple-glow: rgba(139, 92, 246, 0.15);
      --accent-pink: #ec4899;
      --accent-blue: #3b82f6;
      --gradient-primary: linear-gradient(135deg, #8b5cf6, #ec4899);
      --gradient-subtle: linear-gradient(135deg, rgba(139, 92, 246, 0.1), rgba(236, 72, 153, 0.1));
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .bg-gradient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(139, 92, 246, 0.08), transparent),
        radial-gradient(ellipse 40% 30% at 80% 20%, rgba(236, 72, 153, 0.05), transparent),
        radial-gradient(ellipse 40% 30% at 20% 80%, rgba(59, 130, 246, 0.05), transparent);
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      background: var(--gradient-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      color: white;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .tagline {
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 400;
    }

    /* Prompt area */
    .prompt-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 6px;
      margin-bottom: 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .prompt-container:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-purple-glow), var(--shadow-md);
    }

    .prompt-inner {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .prompt-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 15px;
      color: var(--text-primary);
      padding: 14px 16px;
      min-width: 0;
    }

    .prompt-input::placeholder {
      color: var(--text-muted);
    }

    .generate-btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--gradient-primary);
      border: none;
      border-radius: calc(var(--radius-xl) - 4px);
      color: white;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 24px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .generate-btn:hover {
      opacity: 0.9;
    }

    .generate-btn:active {
      transform: scale(0.97);
    }

    .generate-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Controls row */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .control-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 100px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }

    .control-chip:hover {
      background: var(--bg-card);
      border-color: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
    }

    .control-chip.active {
      background: var(--accent-purple-glow);
      border-color: var(--border-focus);
      color: var(--accent-purple);
    }

    .control-chip svg {
      width: 14px;
      height: 14px;
    }

    .control-divider {
      width: 1px;
      height: 20px;
      background: var(--border-subtle);
    }

    .control-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    /* Image grid */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .section-count {
      font-size: 13px;
      color: var(--text-muted);
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 640px) {
      .image-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .image-card {
      position: relative;
      aspect-ratio: 1;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .image-card:hover {
      border-color: rgba(255, 255, 255, 0.1);
      background: var(--bg-card-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .image-card .placeholder-icon {
      color: var(--text-muted);
      margin-bottom: 12px;
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    .image-card:hover .placeholder-icon {
      opacity: 0.7;
    }

    .image-card .placeholder-icon svg {
      width: 48px;
      height: 48px;
    }

    .image-card .placeholder-text {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
    }

    .image-card .placeholder-shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        110deg,
        transparent 25%,
        rgba(139, 92, 246, 0.03) 37%,
        transparent 50%
      );
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Generating state */
    .image-card.generating .placeholder-icon {
      animation: pulse 1.5s ease-in-out infinite;
    }

    .image-card.generating .placeholder-shimmer {
      background: linear-gradient(
        110deg,
        transparent 25%,
        rgba(139, 92, 246, 0.08) 37%,
        transparent 50%
      );
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
    }

    .image-card.generating .placeholder-text {
      color: var(--accent-purple);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
    }

    /* Generated image state */
    .image-card.has-image {
      cursor: pointer;
    }

    .image-card.has-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .image-card.has-image:hover img {
      transform: scale(1.03);
    }

    .image-card .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.6) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 12px;
    }

    .image-card:hover .card-overlay {
      opacity: 1;
    }

    .overlay-actions {
      display: flex;
      gap: 8px;
    }

    .overlay-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .overlay-btn:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .overlay-btn svg {
      width: 14px;
      height: 14px;
    }

    /* Prompt suggestions */
    .suggestions {
      margin-top: 48px;
    }

    .suggestions-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
    }

    .suggestions-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .suggestion-chip {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 100px;
      padding: 8px 16px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .suggestion-chip:hover {
      background: var(--bg-card);
      border-color: var(--border-focus);
      color: var(--text-primary);
    }

    /* Responsive */
    @media (max-width: 480px) {
      .app {
        padding: 24px 16px 60px;
      }

      .generate-btn span {
        display: none;
      }

      .generate-btn {
        padding: 12px 14px;
      }

      .controls {
        gap: 8px;
      }
    }
  </style>
</head>
<body>

<div class="bg-gradient"></div>

<div class="app">

  <div class="prompt-container">

    </button>

      3D Render
    </button>
    <button class="control-chip" data-style="anime">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>

    <div class="control-divider"></div>

    <span class="control-label">Size</span>

    <button class="control-chip" data-size="9:16">9:16</button>

  <!-- Image grid -->

    <span class="section-title">Generated Images</span>
    <span class="section-count" id="imageCount">0 images</span>
  </div>

  <div class="image-grid" id="imageGrid">
    <div class="image-card">
      <div class="placeholder-shimmer"></div>
      <div class="placeholder-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>

          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>

          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <span class="placeholder-text">Awaiting prompt</span>
    </div>
    <div class="image-card">
      <div class="placeholder-shimmer"></div>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>

    <div class="image-card">

          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>

    </div>

  <!-- Suggestions -->

<script>
  const promptInput = document.getElementById('promptInput');
  const generateBtn = document.getElementById('generateBtn');
  const imageGrid = document.getElementById('imageGrid');
  const imageCount = document.getElementById('imageCount');

  // Style chip toggle
  document.querySelectorAll('.control-chip[data-style]').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.control-chip[data-style]').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    });
  });

  // Size chip toggle
  document.querySelectorAll('.control-chip[data-size]').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('.control-chip[data-size]').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
    });
  });

  // Suggestion chips fill the prompt
  document.querySelectorAll('.suggestion-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      promptInput.value = chip.textContent;
      promptInput.focus();
    });
  });

  // Placeholder color palette for simulated generation
  const gradients = [
    'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
    'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
    'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
    'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
    'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
    'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
    'linear-gradient(135deg, #fccb90 0%, #d57eeb 100%)',
    'linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)',
    'linear-gradient(135deg, #f5576c 0%, #ff6a88 100%)',
  ];

  let generatedCount = 0;

  function simulateGeneration() {
    const prompt = promptInput.value.trim();
    if (!prompt) {
      promptInput.focus();
      promptInput.classList.add('shake');
      setTimeout(() => promptInput.classList.remove('shake'), 500);
      return;
    }

    const cards = imageGrid.querySelectorAll('.image-card');

    cards.forEach(card => {
      card.classList.remove('has-image');
      card.classList.add('generating');
      card.innerHTML = `
        <div class="placeholder-shimmer"></div>
        <div class="placeholder-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
        </div>
        <span class="placeholder-text">Generating...</span>
      `;
    });

    cards.forEach((card, i) => {
      const delay = 800 + i * 400;
      setTimeout(() => {
        card.classList.remove('generating');
        card.classList.add('has-image');

        const grad = gradients[(generatedCount + i) % gradients.length];
        card.innerHTML = `
          <div style="width:100%;height:100%;background:${grad};display:flex;align-items:center;justify-content:center;">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <div class="card-overlay">
            <div class="overlay-actions">
              <button class="overlay-btn" title="Download">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              </button>
              <button class="overlay-btn" title="Favorite">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              </button>
              <button class="overlay-btn" title="Regenerate">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
              </button>
            </div>
          </div>
        `;

        card.style.animation = 'fadeIn 0.4s ease';
      }, delay);
    });

    generatedCount += 6;
    imageCount.textContent = `${generatedCount} images`;
  }

  generateBtn.addEventListener('click', simulateGeneration);

  promptInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') simulateGeneration();
  });

  // Inject fadeIn animation
  const styleSheet = document.createElement('style');
  styleSheet.textContent = `
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
    .shake { animation: shake 0.3s ease; }
  `;
  document.head.appendChild(styleSheet);
</script>

</body>
</html>
